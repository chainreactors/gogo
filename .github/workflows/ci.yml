name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic:
    name: basic checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    defaults:
      run:
        working-directory: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
          cache-dependency-path: v2/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Build packages
        run: go build ./...
